# Stack de desenvolvimento local
# Uso: na raiz do projeto -> docker compose up --build
# Serviços:
# - frontend: http://localhost:3010
# - backend:  http://localhost:3011
# - postgres: localhost:5432

services:
  db:
    image: postgres:15-alpine
    container_name: colombocal-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: colombocal_dev
      POSTGRES_DB: colombocal_dev
    ports:
      - "5432:5432"
    volumes:
      - colombocal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d colombocal_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: node:20
    container_name: colombocal-backend-dev
    working_dir: /app
    # postinstall roda prisma generate; generate explícito evita client Prisma velho no volume node_modules
    command: sh -c "npm install && npx prisma generate && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3011
      DATABASE_URL: postgresql://postgres:colombocal_dev@db:5432/colombocal_dev?schema=public
      PRISMA_CLIENT_ENGINE_TYPE: library
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3011:3011"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: colombocal-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_ORIGIN: http://backend:3011
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3010:3010"
    depends_on:
      - backend

volumes:
  colombocal_pgdata:
  backend_node_modules:
  frontend_node_modules:
