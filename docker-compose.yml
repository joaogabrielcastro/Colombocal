version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: colombocal_db
    environment:
      POSTGRES_USER: colombocal
      POSTGRES_PASSWORD: colombocal123
      POSTGRES_DB: colombocal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
